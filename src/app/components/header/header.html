<header class="header">
  <nav class="nav-container">
    <a routerLink="/" class="logo">
      <mat-icon class="logo-icon">code</mat-icon>
      <span class="logo-text"><span class="logo-name">Portfolio</span></span>
    </a>
    <div class="nav-links" [class.mobile-open]="mobileMenuOpen">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMobileMenu()">
        <mat-icon>home</mat-icon>
        <span>Home</span>
      </a>
      <a routerLink="/about" routerLinkActive="active" (click)="closeMobileMenu()">
        <mat-icon>person</mat-icon>
        <span>About</span>
      </a>
      <a routerLink="/skills" routerLinkActive="active" (click)="closeMobileMenu()">
        <mat-icon>school</mat-icon>
        <span>Skills</span>
      </a>
      <a routerLink="/projects" routerLinkActive="active" (click)="closeMobileMenu()">
        <mat-icon>work</mat-icon>
        <span>Projects</span>
      </a>
      <a routerLink="/contact" routerLinkActive="active" (click)="closeMobileMenu()">
        <mat-icon>mail</mat-icon>
        <span>Contact</span>
      </a>
    </div>
    <button class="hamburger" (click)="toggleMobileMenu()" [class.active]="mobileMenuOpen">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>
</header>
